{% extends 'base.html' %}

{% block content %}
<div class="p-3 border-bottom border-secondary border-opacity-50 sticky-top bg-black d-flex align-items-center" style="z-index: 1020; opacity: 0.95;">
    <a href="javascript:history.back()" class="text-white text-decoration-none me-4 fs-5"><i class="bi bi-arrow-left"></i></a>
    <h4 class="text-white mb-0 fw-bold">Change Admin Password</h4>
</div>

<div class="p-4">
    <form method="post">
        {% csrf_token %}
        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="currentPassword" name="current_password" placeholder="Current Password" required>
            <label for="currentPassword" class="text-secondary">Current Password</label>
        </div>
        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="newPassword" name="new_password" placeholder="New Password" required>
            <label for="newPassword" class="text-secondary">New Password</label>
        </div>
        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="confirmPassword" name="confirm_password" placeholder="Confirm Password" required>
            <label for="confirmPassword" class="text-secondary">Confirm Password</label>
        </div>
        
        <div class="text-end">
            <button type="submit" class="btn btn-light rounded-pill fw-bold text-black px-4">Update Password</button>
        </div>
    </form>
</div>
{% endblock %}
