{% extends 'base.html' %}

{% block content %}
<div class="sticky top-16 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 z-40 flex items-center gap-4">
    <a href="javascript:history.back()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
    </a>
    <h2 class="font-serif text-xl font-bold text-primary-container">Edit Post</h2>
</div>

<div class="p-6 max-w-2xl mx-auto">
    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6">
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Post Content</label>
                <textarea name="content" rows="4" required
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-primary-container transition">{{ post.content }}</textarea>
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Image (Optional)</label>
                <input type="file" name="image" accept="image/*"
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-primary-container file:text-white hover:file:opacity-90 transition cursor-pointer">
                {% if post.image %}
                    <div class="mt-4">
                        <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Current Image:</span>
                        <img src="{{ post.image.url }}" class="rounded-xl max-h-48 object-cover border border-slate-100">
                    </div>
                {% endif %}
            </div>
            
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                <a href="javascript:history.back()"
                    class="px-6 py-2 text-sm font-semibold text-slate-600 border border-slate-200 rounded-full hover:bg-slate-50 transition">
                    Cancel
                </a>
                <button type="submit"
                    class="px-8 py-2 bg-primary-container text-white text-sm font-bold rounded-full hover:opacity-90 transition-opacity shadow-lg shadow-primary-container/20">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
