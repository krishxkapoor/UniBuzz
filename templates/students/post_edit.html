{% extends 'base.html' %}

{% block content %}
<div class="p-3 border-bottom border-secondary border-opacity-50 sticky-top bg-black d-flex align-items-center" style="z-index: 1020; opacity: 0.95;">
    <a href="javascript:history.back()" class="text-white text-decoration-none me-4 fs-5"><i class="bi bi-x-lg"></i></a>
    <h4 class="text-white mb-0 fw-bold">Edit Post</h4>
</div>

<div class="p-4">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label text-secondary small">Post Content</label>
            <textarea class="form-control bg-dark text-white" name="content" rows="4" required>{{ post.content }}</textarea>
        </div>
        
        <div class="mb-4">
            <label class="form-label text-secondary small">Image (Optional)</label>
            <input type="file" name="image" class="form-control bg-dark" accept="image/*">
            {% if post.image %}
                <div class="mt-2 text-secondary small">Current Image:</div>
                <img src="{{ post.image.url }}" class="img-fluid rounded-4 mt-2" style="max-height: 200px;">
            {% endif %}
        </div>
        
        <div class="text-end">
            <button type="submit" class="btn btn-light rounded-pill fw-bold text-black px-4">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
